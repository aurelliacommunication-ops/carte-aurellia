<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte praticiens Auréllia®</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#fdf6f9;font-family:'Jost',Georgia,sans-serif;font-weight:300;color:#2a1520;}
  .wrap{max-width:1100px;margin:0 auto;padding:2rem 1.2rem 2.5rem;}
  .header{text-align:center;margin-bottom:1.8rem;}
  .eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#D52d5D;margin-bottom:.5rem;}
  .header h2{font-family:'Cormorant Garamond',Georgia,serif;font-size:2rem;font-weight:300;color:#2a1520;margin-bottom:.3rem;}
  .header p{font-size:.82rem;color:#7a5060;}
  .divider{width:36px;height:1.5px;background:#D52d5D;margin:.7rem auto 0;}
  .layout{display:grid;grid-template-columns:1fr 290px;gap:1.2rem;align-items:start;}
  @media(max-width:750px){.layout{grid-template-columns:1fr;}.list{max-height:260px;}}
  #map{height:500px;width:100%;border-radius:4px;border:1px solid #f0d8e2;box-shadow:0 2px 16px rgba(213,45,93,.07);}
  .list{display:flex;flex-direction:column;gap:.5rem;max-height:500px;overflow-y:auto;padding-right:3px;}
  .list::-webkit-scrollbar{width:3px;}
  .list::-webkit-scrollbar-thumb{background:#f0c0d0;border-radius:2px;}
  .pcard{background:#fff;border:1px solid #f0d8e2;border-left:3px solid transparent;border-radius:3px;padding:.75rem 1rem;cursor:pointer;transition:all .18s;}
  .pcard:hover,.pcard.active{border-color:#D52d5D;border-left-color:#D52d5D;background:#fff8fb;}
  .pcard .nom{font-family:'Cormorant Garamond',Georgia,serif;font-size:.98rem;font-weight:500;color:#2a1520;}
  .pcard .ville{font-size:.7rem;color:#D52d5D;letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
  .footer{text-align:center;margin-top:1rem;font-size:.68rem;color:#D52d5D;letter-spacing:.1em;text-transform:uppercase;}
  .info-window{font-family:'Jost',Georgia,sans-serif;font-weight:300;min-width:220px;padding:4px;}
  .iw-nom{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.05rem;font-weight:500;color:#2a1520;margin-bottom:3px;}
  .iw-titre{font-size:.68rem;color:#D52d5D;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;line-height:1.4;}
  .iw-sep{height:1px;background:#f0d8e2;margin-bottom:8px;}
  .iw-info{font-size:.78rem;color:#5a3545;line-height:1.8;}
  .iw-info a{color:#D52d5D;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <p class="eyebrow">Réseau certifié</p>
    <h2>Trouver un praticien Auréllia®</h2>
    <p>Neuromodulation Auriculaire — praticiens certifiés en France</p>
    <div class="divider"></div>
  </div>
  <div class="layout">
    <div id="map"></div>
    <div class="list" id="liste"></div>
  </div>
  <div class="footer">Auréllia® — Neuromodulation Auriculaire</div>
</div>

let tileCache = {};
const TILE_SIZE = 256;
let zoom = 5;
// Centre France
let centerLat = 46.5, centerLng = 3.5;

function lat2y(lat, z){ return (1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180))/Math.PI)/2 * Math.pow(2,z) * TILE_SIZE; }
function lng2x(lng, z){ return (lng+180)/360 * Math.pow(2,z) * TILE_SIZE; }
function y2lat(y, z){ var n=Math.PI-2*Math.PI*y/(Math.pow(2,z)*TILE_SIZE); return 180/Math.PI*Math.atan(0.5*(Math.exp(n)-Math.exp(-n))); }
function x2lng(x, z){ return x/(Math.pow(2,z)*TILE_SIZE)*360-180; }

function getTile(tx,ty,tz,cb){
  var key=tz+'/'+tx+'/'+ty;
  if(tileCache[key]){cb(tileCache[key]);return;}
  var img=new Image();
  img.crossOrigin='anonymous';
  var s=['a','b','c'][Math.abs(tx+ty)%3];
  img.src='https://'+s+'.tile.openstreetmap.org/'+tz+'/'+tx+'/'+ty+'.png';
  img.onload=function(){tileCache[key]=img;cb(img);};
  img.onerror=function(){cb(null);};
}

var logoImg = new Image();
logoImg.src = LOGO_B64;
logoImg.onload = function(){ draw(); };

function worldToCanvas(lat, lng){
  var cx = lng2x(centerLng, zoom);
  var cy = lat2y(centerLat, zoom);
  var w = canvas.width, h = canvas.height;
  var px = lng2x(lng, zoom) - cx + w/2;
  var py = lat2y(lat, zoom) - cy + h/2;
  return {x:px, y:py};
}

function draw(){
  var w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);

  var cx = lng2x(centerLng, zoom);
  var cy = lat2y(centerLat, zoom);
  var tileX0 = Math.floor((cx - w/2) / TILE_SIZE);
  var tileY0 = Math.floor((cy - h/2) / TILE_SIZE);
  var tileX1 = Math.floor((cx + w/2) / TILE_SIZE);
  var tileY1 = Math.floor((cy + h/2) / TILE_SIZE);

  for(var tx=tileX0; tx<=tileX1; tx++){
    for(var ty=tileY0; ty<=tileY1; ty++){
      var px = tx*TILE_SIZE - cx + w/2;
      var py = ty*TILE_SIZE - cy + h/2;
      (function(ttx,tty,ppx,ppy){
        getTile(ttx,tty,zoom,function(img){
          if(img){ ctx.drawImage(img,ppx,ppy,TILE_SIZE,TILE_SIZE); }
          drawMarkers();
        });
      })(tx,ty,px,py);
    }
  }
  drawMarkers();
}

function drawMarkers(){
  var R = 18;
  P.forEach(function(p,i){
    var pos = worldToCanvas(p.lat, p.lng);
    var isActive = (activeIdx === i);
    var r = isActive ? R*1.3 : R;
    ctx.save();
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = isActive ? '#D52d5D' : 'rgba(213,45,93,0.4)';
    ctx.shadowBlur = isActive ? 10 : 5;
    ctx.fill();
    ctx.restore();
    if(logoImg.complete && logoImg.naturalWidth > 0){
      ctx.save();
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r-2, 0, Math.PI*2);
      ctx.clip();
      ctx.drawImage(logoImg, pos.x-r+2, pos.y-r+2, (r-2)*2, (r-2)*2);
      ctx.restore();
    } else {
      ctx.save();
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI*2);
      ctx.fillStyle = '#D52d5D';
      ctx.fill();
      ctx.restore();
    }
  });
}

function getMarkerAt(mx, my){
  for(var i=0;i<P.length;i++){
    var pos = worldToCanvas(P[i].lat, P[i].lng);
    var dist = Math.sqrt((mx-pos.x)*(mx-pos.x)+(my-pos.y)*(my-pos.y));
    if(dist < 22) return i;
  }
  return -1;
}

// Tooltip
var tipEl = document.createElement('div');
tipEl.style.cssText='position:fixed;background:#fff;border:1px solid #f0d8e2;border-radius:4px;padding:12px 14px;font-family:Georgia,serif;font-size:13px;color:#2a1520;box-shadow:0 4px 20px rgba(213,45,93,.15);max-width:260px;pointer-events:none;display:none;z-index:9999;line-height:1.6;';
document.body.appendChild(tipEl);

canvas.addEventListener('mousemove', function(e){
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width / rect.width;
  var scaleY = canvas.height / rect.height;
  var mx = (e.clientX - rect.left) * scaleX;
  var my = (e.clientY - rect.top) * scaleY;

  if(isDragging){
    var dx = e.clientX - dragStartX;
    var dy = e.clientY - dragStartY;
    var scale = rect.width / canvas.width;
    centerLat = y2lat(lat2y(dragStartCenterLat,zoom) - dy/scale, zoom);
    centerLng = x2lng(lng2x(dragStartCenterLng,zoom) - dx/scale, zoom);
    draw();
    return;
  }

  var idx = getMarkerAt(mx,my);
  if(idx >= 0){
    canvas.style.cursor='pointer';
    var p = P[idx];
    var tels = p.tel.map(function(t){return '<a href="tel:'+t.replace(/\s/g,'')+'" style="color:#D52d5D">'+t+'</a>';}).join(' · ');
    var mail = p.email ? '<br>✉ <a href="mailto:'+p.email+'" style="color:#D52d5D">'+p.email+'</a>' : '';
    tipEl.innerHTML = '<div style="font-family:Georgia,serif;font-size:14px;font-weight:bold;margin-bottom:4px;color:#2a1520">'+p.nom+'</div>'
      +'<div style="font-size:10px;color:#D52d5D;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">'+p.titre+'</div>'
      +'<div style="border-top:1px solid #f0d8e2;margin-bottom:6px;padding-top:6px;font-size:12px">'
      +'📍 '+p.adresse+'<br>📞 '+tels+mail+'</div>';
    tipEl.style.display='block';
    tipEl.style.left=(e.clientX+12)+'px';
    tipEl.style.top=(e.clientY-10)+'px';
  } else {
    canvas.style.cursor='grab';
    tipEl.style.display='none';
  }
});

canvas.addEventListener('mousedown', function(e){
  isDragging=true;
  dragStartX=e.clientX; dragStartY=e.clientY;
  dragStartCenterLat=centerLat; dragStartCenterLng=centerLng;
  canvas.style.cursor='grabbing';
});

canvas.addEventListener('mouseup', function(e){
  var moved = Math.abs(e.clientX-dragStartX)+Math.abs(e.clientY-dragStartY);
  isDragging=false;
  canvas.style.cursor='grab';
  if(moved < 5){
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width/rect.width;
    var scaleY = canvas.height/rect.height;
    var mx = (e.clientX-rect.left)*scaleX;
    var my = (e.clientY-rect.top)*scaleY;
    var idx = getMarkerAt(mx,my);
    if(idx >= 0){
      activeIdx = (activeIdx===idx) ? null : idx;
      document.querySelectorAll('.pcard').forEach(function(c,i){ c.classList.toggle('active', i===activeIdx); });
      draw();
    }
  }
});

canvas.addEventListener('mouseleave', function(){
  isDragging=false;
  tipEl.style.display='none';
  canvas.style.cursor='grab';
});

canvas.addEventListener('wheel', function(e){
  e.preventDefault();
  var rect = canvas.getBoundingClientRect();
  var mx = (e.clientX-rect.left)*(canvas.width/rect.width);
  var my = (e.clientY-rect.top)*(canvas.height/rect.height);
  var latAtMouse = y2lat(lat2y(centerLat,zoom) - canvas.height/2 + my, zoom);
  var lngAtMouse = x2lng(lng2x(centerLng,zoom) - canvas.width/2 + mx, zoom);
  if(e.deltaY < 0 && zoom < 16) zoom++;
  else if(e.deltaY > 0 && zoom > 3) zoom--;
  centerLat = y2lat(lat2y(latAtMouse,zoom) - my + canvas.height/2, zoom);
  centerLng = x2lng(lng2x(lngAtMouse,zoom) - mx + canvas.width/2, zoom);
  draw();
},{passive:false});

// Liste
var liste = document.getElementById('liste');
P.forEach(function(p,i){
  var c=document.createElement('div');
  c.className='pcard';
  c.innerHTML='<div class="nom">'+p.nom+'</div><div class="ville">'+p.ville+'</div>';
  c.onclick=function(){
    activeIdx=(activeIdx===i)?null:i;
    document.querySelectorAll('.pcard').forEach(function(card,j){ card.classList.toggle('active',j===activeIdx); });
    centerLat=p.lat; centerLng=p.lng; zoom=12;
    draw();
    c.scrollIntoView({behavior:'smooth',block:'nearest'});
  };
  liste.appendChild(c);
});

window.addEventListener('resize', function(){
  canvas.width = mapDiv.offsetWidth;
  draw();
});

draw();
</script>
